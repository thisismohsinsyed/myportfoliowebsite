<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#164e63" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)" rx="12"/>
  <!-- Underwater effect -->
  <rect x="40" y="40" width="720" height="360" rx="8" fill="url(#water)"/>
  <!-- Detection boxes -->
  <rect x="80" y="100" width="140" height="100" rx="2" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <rect x="80" y="88" width="90" height="16" rx="2" fill="#22d3ee"/>
  <text x="86" y="100" fill="#0f172a" font-family="Arial" font-size="10" font-weight="bold">Plastic 94%</text>
  <rect x="300" y="160" width="120" height="90" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="300" y="148" width="80" height="16" rx="2" fill="#f59e0b"/>
  <text x="306" y="160" fill="#0f172a" font-family="Arial" font-size="10" font-weight="bold">Metal 87%</text>
  <rect x="520" y="80" width="160" height="120" rx="2" fill="none" stroke="#ef4444" stroke-width="2"/>
  <rect x="520" y="68" width="72" height="16" rx="2" fill="#ef4444"/>
  <text x="526" y="80" fill="#fff" font-family="Arial" font-size="10" font-weight="bold">Tire 91%</text>
  <rect x="180" y="270" width="100" height="80" rx="2" fill="none" stroke="#22c55e" stroke-width="2"/>
  <rect x="180" y="258" width="86" height="16" rx="2" fill="#22c55e"/>
  <text x="186" y="270" fill="#0f172a" font-family="Arial" font-size="10" font-weight="bold">Fabric 78%</text>
  <rect x="480" y="250" width="130" height="95" rx="2" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <rect x="480" y="238" width="76" height="16" rx="2" fill="#a78bfa"/>
  <text x="486" y="250" fill="#0f172a" font-family="Arial" font-size="10" font-weight="bold">Glass 82%</text>
  <!-- Debris shapes inside boxes -->
  <ellipse cx="150" cy="145" rx="40" ry="25" fill="#475569" opacity="0.5"/>
  <rect x="330" y="185" width="60" height="40" rx="3" fill="#78716c" opacity="0.4" transform="rotate(15 360 205)"/>
  <circle cx="600" cy="135" r="35" fill="#44403c" opacity="0.4"/>
  <ellipse cx="230" cy="305" rx="30" ry="20" fill="#64748b" opacity="0.4"/>
  <rect x="510" y="280" width="70" height="40" rx="2" fill="#6b7280" opacity="0.35" transform="rotate(-10 545 300)"/>
  <!-- Model info overlay -->
  <rect x="40" y="40" width="180" height="28" rx="4" fill="#0f172a" opacity="0.8"/>
  <circle cx="56" cy="54" r="5" fill="#ef4444"/>
  <text x="68" y="58" fill="#e2e8f0" font-family="monospace" font-size="11">YOLOv11 | LIVE</text>
  <rect x="580" y="40" width="180" height="28" rx="4" fill="#0f172a" opacity="0.8"/>
  <text x="594" y="58" fill="#94a3b8" font-family="monospace" font-size="11">FPS: 32 | 5 det</text>
  <!-- Title -->
  <text x="400" y="435" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="28" font-weight="bold">Underwater Debris Detection</text>
  <text x="400" y="462" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="14">Real-Time YOLOv11 Object Detection</text>
</svg>
