<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)" rx="12"/>
  <!-- Network/RAG visualization -->
  <!-- Central node -->
  <circle cx="400" cy="200" r="40" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="bold">LLM</text>
  <text x="400" y="210" text-anchor="middle" fill="#a78bfa" font-family="Arial" font-size="9">Engine</text>
  <!-- Surrounding nodes -->
  <circle cx="250" cy="120" r="28" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="250" y="118" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="9">FAISS</text>
  <text x="250" y="130" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="8">Index</text>
  <circle cx="550" cy="120" r="28" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="118" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="9">Vector</text>
  <text x="550" y="130" text-anchor="middle" fill="#22d3ee" font-family="Arial" font-size="8">DB</text>
  <circle cx="220" cy="260" r="28" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="220" y="258" text-anchor="middle" fill="#34d399" font-family="Arial" font-size="9">Env</text>
  <text x="220" y="270" text-anchor="middle" fill="#34d399" font-family="Arial" font-size="8">Reports</text>
  <circle cx="580" cy="260" r="28" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="258" text-anchor="middle" fill="#34d399" font-family="Arial" font-size="9">LLaMA2</text>
  <text x="580" y="270" text-anchor="middle" fill="#34d399" font-family="Arial" font-size="8">7B</text>
  <!-- Connection lines -->
  <line x1="275" y1="138" x2="365" y2="178" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <line x1="525" y1="138" x2="435" y2="178" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <line x1="245" y1="240" x2="370" y2="215" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="555" y1="240" x2="430" y2="215" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <!-- Chat interface mockup -->
  <rect x="200" y="310" width="400" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="215" y="325" width="250" height="28" rx="14" fill="#334155"/>
  <text x="230" y="344" fill="#94a3b8" font-family="Arial" font-size="11">What are PM2.5 levels in Zone A?</text>
  <rect x="280" y="365" width="305" height="28" rx="14" fill="#a78bfa" opacity="0.15"/>
  <text x="295" y="384" fill="#c4b5fd" font-family="Arial" font-size="11">PM2.5 in Zone A averages 42.3 ug/m3...</text>
  <rect x="215" y="405" width="260" height="24" rx="12" fill="#334155"/>
  <text x="230" y="421" fill="#64748b" font-family="Arial" font-size="10">Ask about environmental data...</text>
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="14">RAG-Powered Environmental Intelligence</text>
</svg>
